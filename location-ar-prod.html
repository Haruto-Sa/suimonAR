<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta
      name="description"
      content="公開用ロケーションAR。config/locations-heiRiver.yaml を読み込み、閉伊川水門モデルを表示します。"
    />
    <title>閉伊川 水門AR（本番用）</title>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #f6f7fb;
        background: #050a12;
      }

      .top-bar {
        position: fixed;
        top: 12px;
        left: 12px;
        right: 12px;
        z-index: 10000;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(10, 14, 24, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(8px);
      }

      .top-title {
        font-size: 15px;
        font-weight: 700;
        line-height: 1.4;
      }

      .top-sub {
        margin-top: 2px;
        font-size: 12px;
        opacity: 0.82;
      }

      .top-links {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
        text-decoration: none;
        font-size: 12px;
        font-weight: 700;
      }

      .note {
        position: fixed;
        left: 12px;
        bottom: 12px;
        z-index: 10000;
        max-width: 360px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(10, 14, 24, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 12px;
        line-height: 1.5;
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(8px);
      }

      #motion-permission-button {
        display: none;
        position: fixed;
        top: 90px;
        right: 12px;
        z-index: 10000;
        padding: 9px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.26);
        background: rgba(20, 24, 33, 0.88);
        color: #ffffff;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      @media (max-width: 720px) {
        .top-bar {
          flex-direction: column;
          align-items: flex-start;
        }

        .top-links {
          width: 100%;
          justify-content: flex-start;
        }

        .note {
          right: 12px;
          max-width: none;
        }
      }
    </style>
  </head>
  <body data-suimon-config-url="config/locations-heiRiver.yaml" data-model-kind="suimon">
    <div
      id="ios-permission-overlay"
      style="display:none; position:fixed; inset:0; z-index:20000; background:rgba(0,0,0,0.92); color:#fff; font-family:inherit;"
    >
      <div
        style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; max-width:340px; padding:24px;"
      >
        <div style="font-size:48px; margin-bottom:16px;">📱</div>
        <h2 style="margin:0 0 12px; font-size:20px;">モーションセンサーの許可が必要です</h2>
        <p style="margin:0 0 24px; font-size:15px; opacity:0.85; line-height:1.6;">
          位置情報ARでは端末の向きを検出するためにモーションセンサーを使用します。
        </p>
        <button
          id="ios-grant-button"
          type="button"
          style="padding:14px 32px; border-radius:14px; border:none; background:linear-gradient(135deg,#4e9bff,#6ad0ff); color:#0c1018; font-size:17px; font-weight:700; cursor:pointer;"
        >
          モーションを許可して開始
        </button>
      </div>
    </div>

    <header class="top-bar">
      <div>
        <div class="top-title">閉伊川 水門 AR（本番）</div>
        <div class="top-sub">config/locations-heiRiver.yaml を使用</div>
      </div>
      <div class="top-links">
        <a class="chip" href="index.html">← ホーム</a>
        <a class="chip" href="marker-ar.html">Hiro マーカーAR</a>
      </div>
    </header>

    <button id="motion-permission-button" type="button">モーション再許可</button>

    <div class="note">
      カメラと位置情報の許可が必要です。周囲の安全を確認した場所でご利用ください。GPS/コンパス誤差により数mずれる場合があります。
    </div>

    <script type="module" src="/src/location-ar/main.ts"></script>
  </body>
</html>
