<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matterport（埋め込み）</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #f7f9fc;
        background: #0b111b;
      }

      .back-btn {
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 1000;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(8, 12, 22, 0.76);
        color: #f7f9fc;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        backdrop-filter: blur(6px);
      }

      .wrap {
        width: min(1200px, 100% - 28px);
        margin: 70px auto 24px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }

      p {
        margin: 0 0 14px;
        opacity: 0.86;
        line-height: 1.6;
        font-size: 14px;
      }

      .frame-shell {
        position: relative;
        width: 100%;
        padding-top: 56.25%;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.36);
        background: #050a12;
      }

      .frame-shell iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <a class="back-btn" href="index.html">&larr; ホームに戻る</a>

    <main class="wrap">
      <h1>Matterport 3D 空間</h1>
      <p>埋め込みビューでそのまま閲覧できます。</p>

      <div class="frame-shell">
        <iframe
          width="853"
          height="480"
          src="https://my.matterport.com/show/?m=iv6KVjdHh2e"
          frameborder="0"
          allowfullscreen
          allow="autoplay; fullscreen; web-share; xr-spatial-tracking;"
        ></iframe>
      </div>
    </main>
  </body>
</html>
