<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>水門AR（デモ用）</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta
      name="description"
      content="デモ用ロケーションAR。config/locations.yaml を読み込み、地点選択だけで表示を切り替えます。"
    />
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      .ui-back-button {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 9999;
        padding: 10px 16px;
        font-size: 16px;
        border: none;
        border-radius: 999px;
        background: rgba(20, 24, 33, 0.85);
        color: #ffffff;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
        cursor: pointer;
      }

      .ui-back-button:hover {
        filter: brightness(1.1);
      }

      .info-panel {
        position: fixed;
        z-index: 9998;
        background: rgba(15, 18, 26, 0.88);
        color: #ffffff;
        padding: 16px 20px;
        border-radius: 14px;
        width: 300px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(6px);
        right: 16px;
      }

      .info-panel-model {
        top: 16px;
      }

      .info-panel-status {
        bottom: 16px;
      }

      .info-header {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .info-grid {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 6px 12px;
        font-size: 14px;
      }

      .info-label {
        opacity: 0.7;
      }

      .info-value {
        font-weight: 500;
        word-break: break-word;
      }

      .info-control {
        width: 100%;
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.05);
        color: #ffffff;
        font-size: 14px;
        appearance: none;
      }

      .info-control:focus {
        outline: none;
        border-color: #4e9bff;
        background: rgba(78, 155, 255, 0.15);
      }

      .fixed-note {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 12px;
        line-height: 1.5;
        opacity: 0.9;
      }

      .ui-toggle-button {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 10000;
        padding: 10px 18px;
        border-radius: 999px;
        border: none;
        font-size: 13px;
        font-weight: 600;
        background: rgba(15, 18, 26, 0.85);
        color: #ffffff;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
        cursor: pointer;
        transition: opacity 0.2s ease;
      }

      .ui-toggle-button:hover {
        opacity: 0.85;
      }

      .gps-warning-banner {
        position: fixed;
        right: 16px;
        bottom: 330px;
        width: 300px;
        z-index: 9997;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 193, 7, 0.45);
        background: rgba(58, 43, 3, 0.72);
        color: #ffe6a0;
        font-size: 12px;
        line-height: 1.45;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(6px);
      }

      .gps-warning-banner.warning-emphasis {
        border-color: rgba(255, 98, 98, 0.5);
        background: rgba(74, 20, 20, 0.75);
        color: #ffd2d2;
      }

      body.ui-minimized .info-panel,
      body.ui-minimized #motion-permission-button,
      body.ui-minimized #gps-warning-banner {
        display: none !important;
      }

      body.ui-minimized .ui-toggle-button {
        background: rgba(15, 18, 26, 0.6);
      }
    </style>
  </head>

  <body
    style="margin: 0; overflow: hidden;"
    data-suimon-config-url="config/locations.yaml"
    data-model-kind="suimon"
  >
    <div id="ios-permission-overlay" style="display:none; position:fixed; inset:0; z-index:20000; background:rgba(0,0,0,0.92); color:#fff; font-family:inherit;">
      <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; max-width:340px; padding:24px;">
        <div style="font-size:48px; margin-bottom:16px;">📱</div>
        <h2 style="margin:0 0 12px; font-size:20px;">モーションセンサーの許可が必要です</h2>
        <p style="margin:0 0 24px; font-size:15px; opacity:0.85; line-height:1.6;">
          位置情報ARでは端末の向きを検出するためにモーションセンサーを使用します。<br>
          下のボタンをタップして許可してください。
        </p>
        <button id="ios-grant-button" type="button" style="padding:14px 32px; border-radius:14px; border:none; background:linear-gradient(135deg,#4e9bff,#6ad0ff); color:#0c1018; font-size:17px; font-weight:700; cursor:pointer;">
          モーションを許可して開始
        </button>
      </div>
    </div>

    <button
      class="ui-back-button"
      type="button"
      onclick="window.location.href='index.html'"
    >
      &larr; ホーム
    </button>

    <button
      id="motion-permission-button"
      style="display:none; position: fixed; top: 16px; right: 16px; z-index: 9999; padding: 12px 18px; font-size: 16px; border-radius: 999px; border: none; background: rgba(20, 24, 33, 0.85); color: #ffffff; box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);"
    >
      🎯 モーション再許可
    </button>
    <div id="gps-warning-banner" class="gps-warning-banner">
      GPS/コンパス誤差により数mズレる可能性があります。実在物との厳密一致が必要な場合は高精度ARを使用してください。
    </div>

    <div class="info-panel info-panel-model" id="model-panel">
      <div class="info-header">
        <span>🎬 デモ用: 地点表示</span>
        <span id="info-status">初期化待ち...</span>
      </div>
      <div class="info-grid">
        <span class="info-label">地点選択</span>
        <span class="info-value">
          <select id="target-select" class="info-control"></select>
        </span>
        <span class="info-label">表示モード</span>
        <span class="info-value" id="info-display-mode">GPSモード</span>
      </div>
      <div class="fixed-note">
        サイズ、向き、東西南北オフセットは <code>config/locations.yaml</code> の設定値をそのまま使います。
      </div>
    </div>

    <div class="info-panel info-panel-status" id="status-panel">
      <div class="info-header">
        <span>📍 位置情報</span>
      </div>
      <div class="info-grid">
        <span class="info-label">現在地</span>
        <span class="info-value" id="info-current">--</span>
        <span class="info-label">精度</span>
        <span class="info-value" id="info-accuracy">--</span>
        <span class="info-label">高度</span>
        <span class="info-value" id="info-altitude">--</span>
        <span class="info-label">対象地点</span>
        <span class="info-value" id="info-target">--</span>
        <span class="info-label">距離</span>
        <span class="info-value" id="info-distance">--</span>
        <span class="info-label">方位</span>
        <span class="info-value" id="info-bearing">--</span>
        <span class="info-label">カメラ操作</span>
        <span class="info-value" id="info-orientation-mode">検出中...</span>
      </div>
    </div>

    <button id="ui-toggle-button" class="ui-toggle-button" type="button" aria-pressed="false">
      UI最小化
    </button>

    <script type="module" src="/src/location-ar/main.ts"></script>
  </body>
</html>
